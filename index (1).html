<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>برای زری من ❤️</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --pink:#ff2fb0;
    --purple:#7a2bf0;
    --red:#ff2247;
    --bg:#05030c;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; height:100%; width:100%;
    background:var(--bg);
    overflow:hidden;
    font-family:'Vazirmatn','Tahoma',sans-serif;
    -webkit-tap-highlight-color:transparent;
  }

  /* ----- پس‌زمینه‌ی محو و رنگی متحرک ----- */
  #bg-blur{
    position:fixed; inset:0; z-index:0;
    overflow:hidden;
    filter:blur(90px);
    opacity:.55;
    pointer-events:none;
  }
  .blob{ position:absolute; border-radius:50%; mix-blend-mode:screen; }
  .b1{ width:60vmax; height:60vmax; left:-15%; top:-20%;
       background:radial-gradient(circle,#ff2fb0,transparent 70%);
       animation:float1 26s ease-in-out infinite alternate; }
  .b2{ width:55vmax; height:55vmax; right:-15%; top:50%;
       background:radial-gradient(circle,#7a2bf0,transparent 70%);
       animation:float2 32s ease-in-out infinite alternate; }
  .b3{ width:40vmax; height:40vmax; left:30%; bottom:-20%;
       background:radial-gradient(circle,#c13bff,transparent 70%);
       animation:float3 22s ease-in-out infinite alternate; }
  .b4{ width:48vmax; height:48vmax; right:20%; top:-10%;
       background:radial-gradient(circle,#3b2bf0,transparent 70%);
       animation:float4 38s ease-in-out infinite alternate; }
  @keyframes float1{0%{transform:translate(0,0) scale(1);}100%{transform:translate(12vw,10vh) scale(1.2);}}
  @keyframes float2{0%{transform:translate(0,0) scale(1);}100%{transform:translate(-14vw,-8vh) scale(1.15);}}
  @keyframes float3{0%{transform:translate(0,0) scale(1);}100%{transform:translate(8vw,-12vh) scale(1.25);}}
  @keyframes float4{0%{transform:translate(0,0) scale(1);}100%{transform:translate(-10vw,12vh) scale(1.1);}}

  #scene{ position:fixed; inset:0; z-index:1; display:block; touch-action:none; }

  /* ----- عنوان درخشان بالای قلب ----- */
  #love-title{
    position:fixed; top:5%; left:50%; transform:translate(-50%,0);
    z-index:3; text-align:center; pointer-events:none;
    font-weight:800; font-size:clamp(22px,5.2vw,40px); color:#fff;
    letter-spacing:1px;
    text-shadow:0 0 8px var(--red),0 0 18px var(--red),0 0 40px var(--red);
    animation:pulseGlow 2.2s ease-in-out infinite;
  }
  .heart-emoji{ display:inline-block; animation:beat 1.1s ease-in-out infinite; }
  @keyframes pulseGlow{
    0%,100%{text-shadow:0 0 8px var(--red),0 0 18px var(--red),0 0 36px var(--red);}
    50%{text-shadow:0 0 14px var(--red),0 0 30px var(--red),0 0 60px #ff5a7a;}
  }
  @keyframes beat{
    0%,100%{transform:scale(1);} 25%{transform:scale(1.25);}
    40%{transform:scale(0.95);} 60%{transform:scale(1.15);}
  }

  /* ----- پیام‌های شناور روی دنباله‌های کهکشان ----- */
  #caption{
    position:fixed; z-index:3; transform:translate(-50%,-50%);
    pointer-events:none; text-align:center; white-space:normal; max-width:78vw;
    font-weight:600; font-size:clamp(15px,2.8vw,21px); color:#ffe3f5;
    text-shadow:0 0 6px var(--pink),0 0 16px var(--purple);
    opacity:0; transition:opacity .65s ease;
  }
  #caption.show{ opacity:1; }

  /* ----- صفحه‌ی شروع ----- */
  #start-overlay{
    position:fixed; inset:0; z-index:10; display:flex;
    align-items:center; justify-content:center;
    background:rgba(5,3,12,.88); backdrop-filter:blur(6px);
    transition:opacity .8s ease, visibility .8s; text-align:center;
  }
  #start-overlay.hidden{ opacity:0; visibility:hidden; }
  .start-card{
    padding:34px 40px; border-radius:26px; color:#fff;
    background:linear-gradient(160deg,rgba(255,47,176,.18),rgba(122,43,240,.18));
    border:1px solid rgba(255,255,255,.15);
    max-width:84vw;
  }
  .start-heart{ font-size:46px; margin-bottom:10px; animation:beat 1.1s ease-in-out infinite; }
  .start-card h1{ margin:0 0 8px; font-size:clamp(20px,4.5vw,28px); font-weight:800; }
  .start-card p{ margin:0; opacity:.8; font-size:14px; }

  /* ----- قلب‌های ریز شناور ----- */
  #floating-hearts{ position:fixed; inset:0; z-index:2; overflow:hidden; pointer-events:none; }
  .f-heart{
    position:absolute; bottom:-10vh; will-change:transform,opacity;
    filter:drop-shadow(0 0 6px rgba(255,47,176,.75));
    animation-name:floatUp; animation-timing-function:ease-in-out; animation-iteration-count:infinite;
  }
  @keyframes floatUp{
    0%{ transform:translate(0,0) scale(.7); opacity:0; }
    12%{ opacity:.95; }
    50%{ transform:translate(var(--dx,20px),-55vh) scale(1); }
    88%{ opacity:.85; }
    100%{ transform:translate(calc(var(--dx,20px) * 1.7),-118vh) scale(.6); opacity:0; }
  }
</style>
</head>
<body>

  <div id="bg-blur">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="blob b4"></div>
  </div>

  <canvas id="scene"></canvas>

  <div id="floating-hearts"></div>

  <div id="love-title">دوست دارم <span class="heart-emoji">❤️</span></div>
  <div id="caption"></div>

  <div id="start-overlay">
    <div class="start-card">
      <div class="start-heart">💕</div>
      <h1>برای زری من</h1>
      <p>برای شروع، لمس کن</p>
    </div>
  </div>

  <!--
    فایل صوتی: نام فایل آهنگ را song.mp3 بگذار و کنار همین index.html قرار بده.
    اگر اسم یا فرمت فایل فرق دارد، فقط مقدار src را همینجا تغییر بده.
  -->
  <audio id="bg-audio" src="song.mp3" loop preload="auto"></audio>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  (function(){
    "use strict";

    // ===== پیام‌های عاشقانه (به ترتیب، در حلقه نمایش داده می‌شوند) =====
    var messages = [
      "منیم بالام، امیر سنه قوربان ❤️",
      "🌍 منیم سوگیلیم دونیامسان 💖",
      "🌹 فدای تو بشم زری خانوم 🫂",
      "🥰 منیم عشقیم کیمدییی؟ 💕",
      "🐻 گوگولی بالام کیمدییی؟ 🧸",
      "🤍 بغلت تنها جاییه که میتونم آروم بشم 🫂",
      "🌎 دنیای منی ✨",
      "🌬️ نفس من ❤️",
      "☀️ نور زندگیم 💛"
    ];

    // ===== قلب‌های ریز شناور در پس‌زمینه =====
    (function spawnFloatingHearts(){
      var container = document.getElementById('floating-hearts');
      var heartChars = ['❤️','💗','💕','💖','💓'];
      var count = 16;
      for (var h = 0; h < count; h++) {
        var el = document.createElement('span');
        el.className = 'f-heart';
        el.textContent = heartChars[Math.floor(Math.random() * heartChars.length)];
        var left = Math.random() * 100;
        var size = 14 + Math.random() * 22;
        var duration = 10 + Math.random() * 10;
        var delay = -Math.random() * duration;
        var dx = Math.round(Math.random() * 60 - 30) + 'px';
        el.style.left = left + 'vw';
        el.style.fontSize = size + 'px';
        el.style.animationDuration = duration + 's';
        el.style.animationDelay = delay + 's';
        el.style.setProperty('--dx', dx);
        container.appendChild(el);
      }
    })();

    // ===== راه‌اندازی صحنه =====
    var canvas = document.getElementById('scene');
    var renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0);

    var scene = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 9, 22);
    camera.lookAt(0, 2, 0);

    var universe = new THREE.Group();
    scene.add(universe);

    // ===== کهکشان (نقطه‌های مارپیچی صورتی/بنفش) =====
    var galaxyParams = {
      count: 16000,
      size: 0.045,
      radius: 11,
      branches: 5,
      spin: 1.2,
      randomness: 0.45,
      randomnessPower: 3,
      insideColor: new THREE.Color('#ff5fc7'),
      outsideColor: new THREE.Color('#6a2bdc')
    };

    var galaxyGeo = new THREE.BufferGeometry();
    var positions = new Float32Array(galaxyParams.count * 3);
    var colors = new Float32Array(galaxyParams.count * 3);

    for (var i = 0; i < galaxyParams.count; i++) {
      var i3 = i * 3;
      var radius = Math.random() * galaxyParams.radius;
      var spinAngle = radius * galaxyParams.spin;
      var branchAngle = (i % galaxyParams.branches) / galaxyParams.branches * Math.PI * 2;

      var rx = Math.pow(Math.random(), galaxyParams.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * galaxyParams.randomness * radius;
      var ry = Math.pow(Math.random(), galaxyParams.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * galaxyParams.randomness * radius * 0.35;
      var rz = Math.pow(Math.random(), galaxyParams.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * galaxyParams.randomness * radius;

      positions[i3]     = Math.cos(branchAngle + spinAngle) * radius + rx;
      positions[i3 + 1] = ry;
      positions[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + rz;

      var mixed = galaxyParams.insideColor.clone();
      mixed.lerp(galaxyParams.outsideColor, radius / galaxyParams.radius);
      colors[i3] = mixed.r; colors[i3 + 1] = mixed.g; colors[i3 + 2] = mixed.b;
    }

    galaxyGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    galaxyGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    var galaxyMat = new THREE.PointsMaterial({
      size: galaxyParams.size, sizeAttenuation: true, depthWrite: false,
      blending: THREE.AdditiveBlending, vertexColors: true, transparent: true
    });
    var galaxyPoints = new THREE.Points(galaxyGeo, galaxyMat);
    universe.add(galaxyPoints);

    // ===== قلب نقطه‌نقطه‌ای در مرکز کهکشان =====
    var heartCount = 3200;
    var heartScale = 0.38;
    var heartOffsetY = 1.6;
    var heartPositions = new Float32Array(heartCount * 3);
    var heartColors = new Float32Array(heartCount * 3);
    var heartColorA = new THREE.Color('#ff2fb0');
    var heartColorB = new THREE.Color('#c13bff');

    for (var j = 0; j < heartCount; j++) {
      var j3 = j * 3;
      var t = Math.random() * Math.PI * 2;
      var r = Math.sqrt(Math.random());
      var hx = 16 * Math.pow(Math.sin(t), 3);
      var hy = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);

      heartPositions[j3]     = hx * r * heartScale;
      heartPositions[j3 + 1] = hy * r * heartScale + heartOffsetY;
      heartPositions[j3 + 2] = (Math.random() - 0.5) * 1.1;

      var hc = heartColorA.clone().lerp(heartColorB, Math.random());
      heartColors[j3] = hc.r; heartColors[j3 + 1] = hc.g; heartColors[j3 + 2] = hc.b;
    }

    var heartGeo = new THREE.BufferGeometry();
    heartGeo.setAttribute('position', new THREE.BufferAttribute(heartPositions, 3));
    heartGeo.setAttribute('color', new THREE.BufferAttribute(heartColors, 3));
    var heartMat = new THREE.PointsMaterial({
      size: 0.11, sizeAttenuation: true, depthWrite: false,
      blending: THREE.AdditiveBlending, vertexColors: true, transparent: true
    });
    var heartPoints = new THREE.Points(heartGeo, heartMat);
    universe.add(heartPoints);

    // ===== لایه‌های ستاره‌های ریز چشمک‌زن (حس فضای واقعی) =====
    var starLayers = [];
    function createStarLayer(count, rMin, rMax, baseOpacity, size, freq, phase) {
      var geo = new THREE.BufferGeometry();
      var pos = new Float32Array(count * 3);
      var col = new Float32Array(count * 3);
      var cA = new THREE.Color('#ffffff');
      var cB = new THREE.Color('#e3c8ff');
      for (var k = 0; k < count; k++) {
        var k3 = k * 3;
        var rr = rMin + Math.random() * (rMax - rMin);
        var theta = Math.random() * Math.PI * 2;
        var phi = Math.acos(2 * Math.random() - 1);
        pos[k3]     = rr * Math.sin(phi) * Math.cos(theta);
        pos[k3 + 1] = rr * Math.cos(phi);
        pos[k3 + 2] = rr * Math.sin(phi) * Math.sin(theta);
        var cc = cA.clone().lerp(cB, Math.random() * 0.5);
        col[k3] = cc.r; col[k3 + 1] = cc.g; col[k3 + 2] = cc.b;
      }
      geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
      var mat = new THREE.PointsMaterial({
        size: size, sizeAttenuation: true, depthWrite: false,
        blending: THREE.AdditiveBlending, vertexColors: true, transparent: true, opacity: baseOpacity
      });
      var pts = new THREE.Points(geo, mat);
      universe.add(pts);
      starLayers.push({ mat: mat, base: baseOpacity, freq: freq, phase: phase });
    }
    createStarLayer(700, 16, 34, 0.9, 0.07, 0.6, 0.0);
    createStarLayer(600, 20, 45, 0.75, 0.06, 0.9, 1.4);
    createStarLayer(500, 28, 60, 0.6, 0.05, 1.3, 3.1);
    createStarLayer(400, 35, 80, 0.5, 0.045, 1.7, 4.8);

    // ===== چرخش با لمس / ماوس (با اینرسی) =====
    var dragging = false, prevX = 0, prevY = 0, velX = 0, velY = 0;
    var rot = { x: -0.15, y: 0 };

    function pointFromEvent(e) {
      return { x: e.clientX, y: e.clientY };
    }
    canvas.addEventListener('pointerdown', function (e) {
      dragging = true; var p = pointFromEvent(e); prevX = p.x; prevY = p.y; velX = 0; velY = 0;
    });
    window.addEventListener('pointermove', function (e) {
      if (!dragging) return;
      var p = pointFromEvent(e);
      var dx = p.x - prevX, dy = p.y - prevY;
      velY = dx * 0.005; velX = dy * 0.005;
      rot.y += velY; rot.x += velX;
      rot.x = Math.max(-0.9, Math.min(0.9, rot.x));
      prevX = p.x; prevY = p.y;
    });
    window.addEventListener('pointerup', function () { dragging = false; });
    window.addEventListener('pointercancel', function () { dragging = false; });

    // ===== تغییر اندازه‌ی صفحه =====
    window.addEventListener('resize', function () {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ===== نمایش حلقه‌ای پیام‌ها روی دنباله‌های کهکشان =====
    var captionEl = document.getElementById('caption');
    var msgIndex = 0;
    var anchorLocal = new THREE.Vector3();
    var worldVec = new THREE.Vector3();
    var captionActive = false;

    function pickAnchor() {
      var idx = Math.floor(Math.random() * galaxyParams.count) * 3;
      anchorLocal.set(positions[idx], positions[idx + 1], positions[idx + 2]);
    }

    function updateCaption() {
      if (!captionActive) return;
      worldVec.copy(anchorLocal);
      universe.updateMatrixWorld();
      universe.localToWorld(worldVec);
      worldVec.project(camera);
      var sx = (worldVec.x * 0.5 + 0.5) * window.innerWidth;
      var sy = (1 - (worldVec.y * 0.5 + 0.5)) * window.innerHeight;
      sx = Math.min(Math.max(sx, window.innerWidth * 0.14), window.innerWidth * 0.86);
      sy = Math.min(Math.max(sy, window.innerHeight * 0.16), window.innerHeight * 0.84);
      captionEl.style.left = sx + 'px';
      captionEl.style.top = sy + 'px';
    }

    function showNextMessage() {
      pickAnchor();
      captionEl.textContent = messages[msgIndex % messages.length];
      msgIndex++;
      captionActive = true;
      updateCaption();
      requestAnimationFrame(function () { captionEl.classList.add('show'); });
      setTimeout(function () {
        captionEl.classList.remove('show');
        setTimeout(function () {
          captionActive = false;
          showNextMessage();
        }, 650);
      }, 2600);
    }

    // ===== حلقه‌ی رندر =====
    function animate() {
      requestAnimationFrame(animate);

      if (!dragging) {
        velX *= 0.94; velY *= 0.94;
        rot.x += velX; rot.y += velY;
        rot.x = Math.max(-0.9, Math.min(0.9, rot.x));
      }
      rot.y += 0.0015; // چرخش آرام و خودکار

      universe.rotation.x = rot.x;
      universe.rotation.y = rot.y;

      var tt = performance.now() * 0.001;
      heartPoints.scale.setScalar(1 + Math.sin(tt * 1.6) * 0.045);

      for (var s = 0; s < starLayers.length; s++) {
        var L = starLayers[s];
        L.mat.opacity = L.base * (0.5 + 0.5 * Math.sin(tt * L.freq + L.phase));
      }

      updateCaption();
      renderer.render(scene, camera);
    }
    animate();

    // ===== شروع تجربه با لمس (برای پخش صدا) =====
    var overlay = document.getElementById('start-overlay');
    var audio = document.getElementById('bg-audio');
    overlay.addEventListener('click', function onStart() {
      overlay.classList.add('hidden');
      audio.play().catch(function () {});
      showNextMessage();
    }, { once: true });

  })();
  </script>
</body>
</html>
